<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Savanna Smash</title>
<style>
  :root{
    --sand:#e8c77e;
    --clay:#a6431f;
    --dusk:#3d2a1a;
    --acacia:#4a5d23;
    --sunset:#e2762f;
    --bone:#f4e8c8;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; background:var(--dusk);
    font-family:"Arial Black","Helvetica Neue",Arial,sans-serif;
    touch-action:none; user-select:none;
  }
  #wrap{ position:fixed; inset:0; display:flex; flex-direction:column; }
  canvas{ display:block; width:100%; flex:1 1 0; min-height:0; background:linear-gradient(to bottom,#f0d38f 0%, #e2ac5c 55%, #c07a34 100%); }

  #hud{
    flex:0 0 auto; padding:10px 16px 8px; z-index:4;
    background:linear-gradient(to bottom, rgba(35,22,12,0.55), rgba(35,22,12,0));
  }
  #score{
    text-align:center; color:var(--bone); font-size:26px; letter-spacing:2px;
    text-shadow:2px 2px 0 var(--dusk); line-height:1.1;
  }
  #best{ font-size:12px; color:var(--sand); font-family:Arial,sans-serif; letter-spacing:1px; margin-top:1px; }

  #chargeWrap{
    margin:8px auto 4px; width:min(320px, 82vw); height:14px;
    background:rgba(0,0,0,0.35); border:2px solid rgba(244,232,200,0.5); border-radius:8px;
    overflow:hidden;
  }
  #chargeBar{
    height:100%; width:0%; border-radius:5px;
    background:linear-gradient(90deg,#c98a3a,#e2762f);
    transition:width 0.08s linear, background 0.2s;
  }
  #chargeBar.full{ background:linear-gradient(90deg,#8fd35c,#4a9d2f); }
  #chargeBar.active{ background:linear-gradient(90deg,#ffce7a,#ff9a3d); }
  #chargeBar.onfire{ background:linear-gradient(90deg,#ff5a3a,#c8121a); animation:overpulse 0.4s infinite; }
  @keyframes overpulse{ 0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.4); } }

  #energyWrap{
    margin:5px auto 4px; width:min(320px, 82vw); height:10px;
    background:rgba(0,0,0,0.35); border:2px solid rgba(139,179,90,0.5); border-radius:6px;
    overflow:hidden;
  }
  #energyBar{
    height:100%; width:0%; border-radius:4px;
    background:linear-gradient(90deg,#6b8f34,#4a9d2f);
    transition:width 0.08s linear, background 0.2s;
  }
  #energyBar.full{ background:linear-gradient(90deg,#a8e05c,#6bc22f); animation:overpulse 0.4s infinite; }
  #energyBar.draining{ background:linear-gradient(90deg,#ffb347,#ff5a1a); }

  #tiltBadge{
    text-align:center; margin-top:4px;
    font-size:10px; letter-spacing:2px; color:var(--sand); font-family:Arial,sans-serif;
    opacity:0.75; text-transform:uppercase;
  }

  #smashBtn{
    flex:0 0 auto; width:100%; height:92px; z-index:4;
    background:linear-gradient(to bottom, var(--clay), #7a2a10);
    border:none; border-top:3px solid rgba(244,232,200,0.35);
    color:var(--bone); font-size:26px; letter-spacing:4px;
    box-shadow:0 -6px 18px rgba(0,0,0,0.35) inset, 0 -2px 0 rgba(0,0,0,0.2);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #smashBtn:active{ filter:brightness(0.85); }
  #smashBtn.notready{ background:linear-gradient(to bottom, #7a5a44, #4a3626); color:rgba(244,232,200,0.55); }
  #smashBtn.boosting{ background:linear-gradient(to bottom, #ff9a3d, #e2762f); }
  #smashBtn.super{ background:linear-gradient(to bottom, #ffcf5a, #ff3a10); animation:overpulse 0.3s infinite; }

  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    color:var(--bone); background:rgba(35,22,12,0.86);
    padding:24px; z-index:5;
  }
  .hidden{ display:none !important; }

  h1{
    font-size:clamp(34px,10vw,58px); letter-spacing:2px; margin:0 0 4px;
    color:var(--sunset); text-shadow:3px 3px 0 var(--dusk), 0 0 22px rgba(226,118,47,0.5);
    transform:skewX(-4deg);
  }
  .sub{ font-size:14px; letter-spacing:3px; color:var(--sand); margin-bottom:26px; text-transform:uppercase; opacity:0.85; }
  p.rules{ max-width:320px; font-size:14px; line-height:1.55; color:var(--bone); font-weight:normal; font-family:Arial,sans-serif; opacity:0.9; margin:0 0 22px; }
  .rules b{ color:var(--sunset); }

  button.primary{
    font-family:inherit; font-size:20px; letter-spacing:2px; color:var(--dusk);
    background:var(--sunset); border:none; padding:16px 38px; border-radius:8px;
    box-shadow:0 6px 0 #a4501c, 0 8px 14px rgba(0,0,0,0.4);
    text-transform:uppercase; margin-top:6px;
  }
  button.primary:active{ transform:translateY(4px); box-shadow:0 2px 0 #a4501c; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div id="score" class="hidden">0<div id="best"></div></div>
    <div id="chargeWrap" class="hidden"><div id="chargeBar"></div></div>
    <div id="energyWrap" class="hidden"><div id="energyBar"></div></div>
    <div id="tiltBadge" class="hidden"></div>
  </div>

  <canvas id="c"></canvas>

  <button id="smashBtn" class="hidden notready">SMASH</button>

  <div class="screen" id="startScreen">
    <h1>SAVANNA<br>SMASH</h1>
    <div class="sub">un rinoceronte molto nervoso</div>
    <p class="rules">
      Inclina il telefono a <b>sinistra/destra</b> per muovere il rinoceronte.<br><br>
      I <b>sassi chiari</b> si rompono se colpiti mentre premi <b>SMASH</b> (che ti dà anche una scarica di velocità).<br><br>
      I <b>macigni scuri</b> vanno sempre evitati: non si rompono mai.
    </p>
    <button class="primary" id="startBtn">Gioca</button>
  </div>

  <div class="screen hidden" id="overScreen">
    <h1 style="font-size:clamp(30px,9vw,46px)">SCHIANTATO</h1>
    <p class="rules" id="finalScore" style="font-size:18px;"></p>
    <button class="primary" id="retryBtn">Riprova</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const overScreen = document.getElementById('overScreen');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const smashBtn = document.getElementById('smashBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const finalScoreEl = document.getElementById('finalScore');
  const tiltBadge = document.getElementById('tiltBadge');
  const chargeWrap = document.getElementById('chargeWrap');
  const chargeBar = document.getElementById('chargeBar');
  const energyWrap = document.getElementById('energyWrap');
  const energyBar = document.getElementById('energyBar');

  let W,H,DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2.5);
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', ()=>setTimeout(resize,150));
  resize();

  // ---------- state ----------
  let state = 'idle'; // idle | playing | over
  let best = Number(localStorage.getItem('savannaBest')||0);
  bestEl.textContent = 'Record: '+best;

  const ENERGY_GAIN = 10, ENERGY_DRAIN = 0.55;

  let player, rocks, grasses, particles, dust, t, score, scrollSpeed, spawnTimer, grassTimer, boostActive, superMode, boostTimer, charge, energy, shake, roadOffset;
  let tiltX = 0;       // -1..1 target from gyroscope/touch
  let smoothX = 0;      // smoothed player position factor

  function resetGame(){
    player = { x: W/2, y: H-120, w: 74, h: 58, vx:0 };
    rocks = [];
    grasses = [];
    particles = [];
    dust = [];
    t = 0;
    score = 0;
    scrollSpeed = 3.4;
    spawnTimer = 0;
    grassTimer = 90;
    boostActive = false;
    superMode = false;
    boostTimer = 0;
    charge = 0;
    energy = 0;
    shake = 0;
    roadOffset = 0;
    tiltX = 0; smoothX = 0;
  }

  function roadBounds(){
    const rw = roadW();
    const rx = W/2 - rw/2;
    return { left: rx+30, right: rx+rw-30 };
  }

  // ---------- rock helpers ----------
  function spawnRock(){
    const isWeak = Math.random() < 0.62;
    const size = 24+Math.random()*12;
    const b = roadBounds();
    rocks.push({
      x: b.left + Math.random()*(b.right-b.left),
      y: -size,
      r: size,
      weak: isWeak,
      rot: Math.random()*6,
      spin: (Math.random()-0.5)*0.006,
    });
  }

  function spawnGrass(){
    const size = 15+Math.random()*5;
    const b = roadBounds();
    grasses.push({
      x: b.left + Math.random()*(b.right-b.left),
      y: -size,
      r: size,
      sway: Math.random()*6.28,
    });
  }

  function burst(x,y,color,n){
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 2+Math.random()*4;
      particles.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:28+Math.random()*10, color, size:3+Math.random()*4});
    }
  }

  // ---------- drawing ----------
  const roadW = ()=> Math.min(W*0.82, 460);
  function drawBackground(offset){
    ctx.clearRect(0,0,W,H);
    // grass verges (savanna ground, top-down)
    ctx.fillStyle = '#8a9a3f';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(74,93,35,0.35)';
    for(let i=0;i<26;i++){
      const bx = (i*97 + 41) % W;
      const by = ((i*133 + offset*0.5) % (H+80)) - 40;
      ctx.beginPath(); ctx.ellipse(bx,by, 14,9, 0.4, 0, Math.PI*2); ctx.fill();
    }
    // scattered bushes/rocks off-road
    ctx.fillStyle = 'rgba(61,42,26,0.28)';
    for(let i=0;i<10;i++){
      const side = i%2===0 ? 0.06+Math.random()*0.05 : 0.94-Math.random()*0.05;
      const bx = W*side;
      const by = ((i*211 + offset*0.5) % (H+120)) - 60;
      ctx.beginPath(); ctx.ellipse(bx,by, 20,14, 0, 0, Math.PI*2); ctx.fill();
    }

    // dirt road down the middle
    const rw = roadW();
    const rx = W/2 - rw/2;
    ctx.fillStyle = '#c98f4e';
    roundRectPath(rx, -4, rw, H+8, 26);
    ctx.fill();
    // road shading edges
    const grad = ctx.createLinearGradient(rx,0,rx+rw,0);
    grad.addColorStop(0,'rgba(120,74,30,0.35)');
    grad.addColorStop(0.12,'rgba(0,0,0,0)');
    grad.addColorStop(0.88,'rgba(0,0,0,0)');
    grad.addColorStop(1,'rgba(120,74,30,0.35)');
    ctx.fillStyle = grad;
    roundRectPath(rx, -4, rw, H+8, 26);
    ctx.fill();

    // worn foot trail texture scrolling down the centre
    ctx.setLineDash([22,18]);
    ctx.lineDashOffset = -offset;
    ctx.beginPath();
    ctx.moveTo(W/2, -20); ctx.lineTo(W/2, H+20);
    ctx.strokeStyle = 'rgba(150,96,44,0.3)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.setLineDash([]);

    // pebble speckles on road, scrolling
    ctx.fillStyle = 'rgba(110,68,30,0.4)';
    for(let i=0;i<18;i++){
      const px = rx + ((i*53)%rw)*0.94 + 6;
      const py = ((i*97 + offset) % (H+60)) - 30;
      ctx.beginPath(); ctx.arc(px,py, 2.4, 0, Math.PI*2); ctx.fill();
    }
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawDust(){
    for(const d of dust){
      ctx.globalAlpha = d.life/26 * 0.5;
      ctx.fillStyle = d.color || '#fff4da';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawRhino(){
    ctx.save();
    // ground shadow
    ctx.beginPath();
    ctx.fillStyle = 'rgba(40,26,12,0.28)';
    ctx.ellipse(player.x+4, player.y+10, 30, 34, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.translate(player.x, player.y);
    const bank = Math.max(-10, Math.min(10, -player.vx*3));
    ctx.rotate(bank*Math.PI/180);

    const body = superMode ? '#5c3018' : (boostActive ? '#7a5a3a' : '#8a6a48');

    // legs (top-down, peeking out either side, alternating for a running feel)
    ctx.fillStyle = '#5c4128';
    const legPhase = Math.sin(t*0.5)*4;
    ctx.beginPath(); ctx.ellipse(-20, -6+legPhase, 7, 13, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(20, -6-legPhase, 7, 13, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-18, 20-legPhase, 7, 13, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(18, 20+legPhase, 7, 13, -0.2, 0, Math.PI*2); ctx.fill();

    // tail
    ctx.strokeStyle = '#5c4128'; ctx.lineWidth = 5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,32); ctx.lineTo(6,44); ctx.stroke();

    // body (elongated, snout pointing up = direction of travel)
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.ellipse(0,4,22,32,0,0,Math.PI*2);
    ctx.fill();

    // head/snout
    ctx.beginPath();
    ctx.ellipse(0,-28,15,20,0,0,Math.PI*2);
    ctx.fill();

    // ears
    ctx.beginPath(); ctx.ellipse(-13,-22,6,7,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(13,-22,6,7,-0.5,0,Math.PI*2); ctx.fill();

    // horn
    ctx.fillStyle = '#f4e8c8';
    ctx.beginPath();
    ctx.moveTo(-4,-42); ctx.lineTo(4,-42); ctx.lineTo(0,-58);
    ctx.closePath(); ctx.fill();

    // eyes
    ctx.fillStyle = '#241708';
    ctx.beginPath(); ctx.arc(-7,-30,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-30,1.8,0,Math.PI*2); ctx.fill();

    if(superMode){
      for(let i=0;i<6;i++){
        const fx = (Math.sin(t*0.9+i*1.7))*16;
        const fy = 6 + Math.sin(t*0.6+i)*4 + i*7;
        const flick = 0.7 + Math.sin(t*0.7+i*2)*0.3;
        const grad = ctx.createRadialGradient(fx,fy,0, fx,fy, 14*flick);
        grad.addColorStop(0,'rgba(255,230,140,0.95)');
        grad.addColorStop(0.5,'rgba(255,140,40,0.8)');
        grad.addColorStop(1,'rgba(200,40,10,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(fx, fy+20, 10*flick, 16*flick, 0, 0, Math.PI*2);
        ctx.fill();
      }
    } else if(boostActive){
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#ffb15c';
      ctx.lineWidth = 4;
      for(let i=1;i<=3;i++){
        ctx.beginPath();
        ctx.ellipse(0, 40+i*14, 14, 9, 0, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  function drawRock(rk){
    ctx.save();
    // drop shadow grounding it on the road
    ctx.beginPath();
    ctx.fillStyle = 'rgba(40,26,12,0.25)';
    ctx.ellipse(rk.x+rk.r*0.12, rk.y+rk.r*0.18, rk.r*0.95, rk.r*0.8, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.translate(rk.x, rk.y);
    ctx.rotate(rk.rot);
    if(rk.weak){
      // cluster of pebbles, seen from above
      ctx.fillStyle = '#cdb27f';
      const pts = [[-0.55,-0.1],[0.05,-0.5],[0.6,-0.05],[0.4,0.5],[-0.3,0.55],[-0.65,0.15]];
      ctx.beginPath();
      pts.forEach((p,i)=>{ const x=p[0]*rk.r, y=p[1]*rk.r; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.ellipse(-rk.r*0.15,-rk.r*0.15, rk.r*0.28, rk.r*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(80,55,25,0.35)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-rk.r*0.2,-rk.r*0.25); ctx.lineTo(rk.r*0.15,rk.r*0.3); ctx.stroke();
    } else {
      // single flat boulder, top-down with radial cracks
      const grad = ctx.createRadialGradient(-rk.r*0.2,-rk.r*0.2,rk.r*0.1, 0,0,rk.r);
      grad.addColorStop(0,'#6b625a'); grad.addColorStop(1,'#3f3833');
      ctx.fillStyle = grad;
      ctx.beginPath();
      const pts = [[-0.9,0.05],[-0.45,-0.85],[0.35,-0.95],[0.9,-0.1],[0.7,0.7],[-0.1,0.95],[-0.75,0.6]];
      pts.forEach((p,i)=>{ const x=p[0]*rk.r, y=p[1]*rk.r; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(rk.r*0.5,-rk.r*0.3); ctx.moveTo(0,0); ctx.lineTo(-rk.r*0.3,rk.r*0.5); ctx.stroke();
    }
    ctx.restore();
  }

  function drawGrass(g){
    ctx.save();
    ctx.beginPath();
    ctx.fillStyle = 'rgba(40,26,12,0.18)';
    ctx.ellipse(g.x, g.y+g.r*0.3, g.r*0.9, g.r*0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.translate(g.x, g.y);
    const sw = Math.sin(t*0.08 + g.sway)*0.15;
    ctx.strokeStyle = '#3f5a1e'; ctx.lineWidth = 2.6; ctx.lineCap='round';
    for(let i=-2;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(i*4, g.r*0.4);
      ctx.quadraticCurveTo(i*4 + sw*10, -g.r*0.2, i*4 + sw*18, -g.r*0.95);
      ctx.strokeStyle = i%2===0 ? '#6b8f34' : '#4a6c24';
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0,p.life/38);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- update ----------
  function circleRectHit(cx,cy,cr, rx,ry,rw,rh){
    const dx = Math.max(rx-rw/2-cx, 0, cx-(rx+rw/2));
    const dy = Math.max(ry-rh/2-cy, 0, cy-(ry+rh/2));
    return (dx*dx+dy*dy) < cr*cr;
  }

  function endGame(){
    state = 'over';
    smashBtn.classList.add('hidden');
    scoreEl.classList.add('hidden');
    tiltBadge.classList.add('hidden');
    chargeWrap.classList.add('hidden');
    energyWrap.classList.add('hidden');
    resize();
    if(score>best){ best=score; localStorage.setItem('savannaBest', String(best)); }
    finalScoreEl.innerHTML = 'Punteggio: <b>'+score+'</b><br>Record: '+best;
    overScreen.classList.remove('hidden');
  }

  function update(){
    t++;
    // player movement toward tilt target
    smoothX += (tiltX - smoothX) * 0.16;
    const rbT = roadBounds();
    const targetX = W/2 + smoothX * (rbT.right - W/2);
    player.vx = (targetX - player.x) * 0.18;
    player.x += player.vx;
    const rb = roadBounds();
    player.x = Math.max(rb.left, Math.min(rb.right, player.x));

    // difficulty ramps with score
    const diff = 1 + score/600;
    const curSpeed = scrollSpeed * diff * (superMode ? 2.6 : (boostActive?2.0:1));
    roadOffset += curSpeed;

    spawnTimer -= diff;
    if(spawnTimer<=0){
      spawnRock();
      spawnTimer = Math.max(18, 46 - diff*4) - (boostActive?8:0);
    }
    grassTimer -= diff;
    if(grassTimer<=0){
      spawnGrass();
      grassTimer = 130 + Math.random()*90;
    }

    for(let i=rocks.length-1;i>=0;i--){
      const rk = rocks[i];
      rk.y += curSpeed;
      rk.rot += rk.spin;
      if(rk.y - rk.r > H+20){ rocks.splice(i,1); score += 1; continue; }

      const hit = circleRectHit(rk.x, rk.y, rk.r*0.75, player.x, player.y, player.w, player.h);
      if(hit){
        if(superMode){
          burst(rk.x, rk.y, rk.weak ? '#cdb27f' : '#8a8378', 16);
          rocks.splice(i,1);
          score += rk.weak ? 8 : 16;
          shake = 9;
        } else if(rk.weak && boostActive){
          burst(rk.x, rk.y, '#cdb27f', 14);
          rocks.splice(i,1);
          score += 8;
          shake = 8;
        } else {
          burst(player.x, player.y, '#b23a1a', 22);
          shake = 16;
          endGame();
          return;
        }
      }
    }

    for(let i=grasses.length-1;i>=0;i--){
      const g = grasses[i];
      g.y += curSpeed;
      if(g.y - g.r > H+20){ grasses.splice(i,1); continue; }
      const hit = circleRectHit(g.x, g.y, g.r*0.8, player.x, player.y, player.w, player.h);
      if(hit){
        burst(g.x, g.y, '#6b8f34', 10);
        grasses.splice(i,1);
        energy = Math.min(energy + ENERGY_GAIN, 100);
        if(energy>=100 && !superMode){
          superMode = true; boostActive = true;
          shake = 14;
          burst(player.x, player.y, '#ff9a3d', 26);
        }
      }
    }

    const BOOST_MAX = 55, RECHARGE_RATE = 100/70;
    if(superMode){
      energy -= ENERGY_DRAIN * diff;
      if(t%2===0) dust.push({x:player.x-30, y:player.y+12, size:6+Math.random()*4, life:26, color:'#ff9a3d'});
      if(energy<=0){ energy=0; superMode=false; boostActive=false; }
    } else if(boostActive){
      boostTimer--;
      if(t%2===0) dust.push({x:player.x-30, y:player.y+12, size:6+Math.random()*4, life:26, color:'#fff4da'});
      if(boostTimer<=0){ boostActive=false; }
    } else if(charge<100){
      charge = Math.min(charge + RECHARGE_RATE*diff, 100);
    }

    for(let i=dust.length-1;i>=0;i--){ const d=dust[i]; d.x -= curSpeed*0.5; d.y += 0.3; d.life--; if(d.life<=0) dust.splice(i,1); }
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life--; if(p.life<=0) particles.splice(i,1); }

    if(shake>0) shake *= 0.85;

    score += 0.06*diff;
    scoreEl.firstChild.textContent = Math.floor(score);

    // smash bar: normal recharge/ready display, forced full+red while on fire
    let pct, ready = false;
    if(superMode){ pct = 1; chargeBar.className = 'onfire'; }
    else if(boostActive){ pct = boostTimer/BOOST_MAX; chargeBar.className='active'; }
    else if(charge<100){ pct = charge/100; chargeBar.className=''; }
    else { pct = 1; ready = true; chargeBar.className='full'; }
    chargeBar.style.width = Math.max(0,Math.min(1,pct))*100 + '%';

    // energy bar: fed by grass, drains while on fire
    energyBar.style.width = Math.max(0,Math.min(100,energy)) + '%';
    energyBar.className = superMode ? 'draining' : (energy>=100 ? 'full' : '');

    smashBtn.classList.toggle('notready', !ready && !boostActive);
    smashBtn.classList.toggle('boosting', boostActive && !superMode);
    smashBtn.classList.toggle('super', superMode);
    smashBtn.textContent = superMode ? 'SMASH!' : (boostActive ? 'SMASH!' : (ready ? 'SMASH' : 'RICARICA...'));
  }

  function loop(){
    if(state==='playing'){
      update();
    }
    ctx.save();
    if(shake>0.3){
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    drawBackground(roadOffset||0);
    drawDust();
    for(const g of (grasses||[])) drawGrass(g);
    for(const rk of rocks) drawRock(rk);
    if(state!=='idle') drawRhino();
    drawParticles();
    ctx.restore();
    requestAnimationFrame(loop);
  }

  // ---------- controls ----------
  function handleOrientation(e){
    if(e.gamma===null) return;
    let g = e.gamma; // -90..90 left/right tilt
    g = Math.max(-30, Math.min(30, g));
    tiltX = g/30;
  }

  let usingTouchFallback = false;
  function enableTouchFallback(){
    usingTouchFallback = true;
    tiltBadge.textContent = 'CONTROLLI: TOCCA E SCORRI';
    let dragging=false;
    canvas.addEventListener('touchstart', ()=>dragging=true);
    canvas.addEventListener('touchend', ()=>dragging=false);
    canvas.addEventListener('touchmove', (ev)=>{
      const x = ev.touches[0].clientX;
      tiltX = Math.max(-1, Math.min(1, (x - W/2)/(W/2-60)));
    }, {passive:true});
    window.addEventListener('mousemove', (ev)=>{
      if(ev.buttons!==1) return;
      tiltX = Math.max(-1, Math.min(1, (ev.clientX - W/2)/(W/2-60)));
    });
    window.addEventListener('keydown', (ev)=>{
      if(ev.key==='ArrowLeft') tiltX=-1;
      if(ev.key==='ArrowRight') tiltX=1;
    });
    window.addEventListener('keyup', ()=>{ tiltX=0; });
  }

  function setupGyro(){
    if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().then(resp=>{
        if(resp === 'granted'){
          window.addEventListener('deviceorientation', handleOrientation);
          tiltBadge.textContent = 'CONTROLLI: INCLINA IL TELEFONO';
        } else {
          enableTouchFallback();
        }
      }).catch(()=>enableTouchFallback());
    } else if(typeof DeviceOrientationEvent !== 'undefined'){
      window.addEventListener('deviceorientation', handleOrientation);
      tiltBadge.textContent = 'CONTROLLI: INCLINA IL TELEFONO';
      // some Android browsers never fire the event if no sensor -> fallback after check
      setTimeout(()=>{ if(t<5) enableTouchFallback(); }, 1200);
    } else {
      enableTouchFallback();
    }
  }

  function startGame(){
    state = 'playing';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    scoreEl.classList.remove('hidden');
    smashBtn.classList.remove('hidden');
    tiltBadge.classList.remove('hidden');
    chargeWrap.classList.remove('hidden');
    energyWrap.classList.remove('hidden');
    resize();
    resetGame();
    setupGyro();
  }

  function pressSmash(){
    if(state!=='playing') return;
    if(boostActive || charge<100) return;
    boostActive = true;
    superMode = false;
    boostTimer = 55;
    charge = 0;
    shake = 6;
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);
  smashBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); pressSmash(); });
  smashBtn.addEventListener('click', pressSmash);

  resetGame();
  loop();
})();
</script>
</body>
</html>
