<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shroomatch</title>
<style>
  :root { --cell: 54px; --gap: 5px; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #0d0d1a; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif; color: #ccc;
  }
  #app {
    width: 380px; padding: 16px; background: #1a1a2e; border-radius: 14px;
    box-shadow: 0 0 50px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.04);
    position: relative; overflow: hidden;
  }
  h1 { text-align: center; font-size: 22px; letter-spacing: 2px; color: #e0d7ff; margin: 0 0 6px; }
  #score { text-align: center; font-size: 14px; color: #999; margin-bottom: 14px; }

  #powerbars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 8px; margin-bottom: 16px; }
  .pb { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .pb-track { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
  .pb-fill { height: 100%; width: 0%; border-radius: 4px; transition: width .25s ease; }
  .pb-label { font-size: 9px; letter-spacing: .3px; color: #666; transition: color .2s ease; }
  .pb-label.full { color: #fff; }

  #board {
    display: grid; grid-template-columns: repeat(6, var(--cell)); grid-template-rows: repeat(6, var(--cell));
    gap: var(--gap); justify-content: center;
    background: #111122; border-radius: 14px; padding: 8px; margin: 0 auto 18px; width: max-content;
  }
  .cell {
    position: relative; width: var(--cell); height: var(--cell);
    border-radius: 10px; background: #20202f; border: 2px solid #14141f; cursor: pointer;
  }
  .cell.empty { background: #14141f; border-color: #0a0a12; cursor: default; }
  .cell.black { background: #1c1c1c; border-color: #000; }
  .cell img {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    object-fit: contain; pointer-events: none;
  }
  .cell img.mush { width: 80%; height: 80%; }
  .cell img.icon { width: 58%; height: 58%; }
  .cell img.icon.big { width: 82%; height: 82%; }

  #controls { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
  .col-label { font-size: 9px; letter-spacing: 1px; color: #666; margin-bottom: 4px; display: block; }
  #reserveWrap, #queueWrap { display: flex; flex-direction: column; align-items: flex-start; }
  #queue { display: flex; align-items: flex-end; gap: 8px; }

  .token {
    position: relative; border-radius: 8px; background: #20202f; border: 2px solid #14141f;
    display: flex; align-items: center; justify-content: center;
  }
  .token img {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 82%; height: 82%; object-fit: contain; pointer-events: none;
  }
  .token span { font-size: 9px; color: #555; }
  .token.reserve { width: 50px; height: 50px; cursor: pointer; }
  .q0 { width: 50px; height: 50px; opacity: 1; }
  .q1 { width: 38px; height: 38px; opacity: .75; }
  .q2 { width: 30px; height: 30px; opacity: .5; }
  .token.witch { background: #2c2c54; }
  .token.bomber { background: #5c2c2c; }

  #spiderWrap { text-align: right; }
  #spiderCountdown { font-size: 26px; font-weight: 800; color: #e74c3c; display: block; }

  #feedback { text-align: center; font-size: 13px; color: #888; min-height: 18px; margin-bottom: 10px; }

  .btn {
    display: block; margin: 0 auto; padding: 9px 18px; border-radius: 8px;
    background: transparent; border: 1.5px solid #555; color: #aaa; font-size: 12px;
    letter-spacing: .5px; cursor: pointer; font-family: inherit;
  }
  .btn:hover { border-color: #888; color: #fff; }

  #gameOver {
    position: absolute; inset: 0; background: rgba(0,0,0,.85);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    border-radius: 14px;
  }
  #gameOver.show { display: flex; }
  #gameOver h2 { color: #e74c3c; font-size: 28px; letter-spacing: 3px; margin: 0; }
  #gameOver p { color: #ccc; font-size: 16px; margin: 0; }
  #gameOver .btn { background: #e74c3c; border-color: #e74c3c; color: #fff; padding: 12px 28px; font-size: 14px; }

  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; color: #aaa; font-size: 13px; text-align: center; padding: 24px;
    border-radius: 14px; white-space: pre-line; line-height: 1.5;
  }
  #loading.hide { display: none; }
</style>
</head>
<body>
<div id="app">
  <h1>🍄 SHROOMATCH</h1>
  <div id="score">Punteggio: 0</div>
  <div id="powerbars"></div>
  <div id="board"></div>
  <div id="controls">
    <div id="reserveWrap">
      <span class="col-label">RISERVA</span>
      <div class="token reserve" id="reserveToken"><img></div>
    </div>
    <div id="queueWrap">
      <span class="col-label">PROSSIMI</span>
      <div id="queue"></div>
    </div>
    <div id="spiderWrap">
      <span class="col-label">RAGNO TRA</span>
      <span id="spiderCountdown">2</span>
    </div>
  </div>
  <div id="feedback"></div>
  <button class="btn" id="newGameBtn">↺ NUOVA PARTITA</button>

  <div id="gameOver">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button class="btn" id="retryBtn">RIGIOCA</button>
  </div>

  <div id="loading">Caricamento asset…</div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   SHROOMATCH — versione HTML/CSS/JS puro (niente canvas/WebGL)
   Stessa logica di gioco già validata nella versione PixiJS,
   qui applicata a un rendering DOM nativo: più semplice e
   robusto per una griglia 2D con PNG statici.
   ═══════════════════════════════════════════════════════ */

// ── COSTANTI ─────────────────────────────────────────────
const ROWS = 6, COLS = 6;
const SPIDER_EVERY = 2;
const ANIM_MS    = 200;
const CASCADE_MS = 260;
const POWER_MAX  = 20;

const SPIDER_THRESHOLDS = [
  { min: 2000, level: 4 },
  { min: 1500, level: 3 },
  { min: 500,  level: 2 },
  { min: 0,    level: 1 },
];

const COLORS = {
  red: 0xe74c3c, yellow: 0xf1c40f, blue: 0x3498db,
  green: 0x2ecc71, orange: 0xe67e22, purple: 0x9b59b6,
};
const COLOR_NAMES  = Object.keys(COLORS);
const COLOR_LABELS = { red: 'Rossi', yellow: 'Gialli', blue: 'Blu', green: 'Verdi', orange: 'Arancioni', purple: 'Viola' };
function cssColor(hex) { return '#' + hex.toString(16).padStart(6, '0'); }

// ═══════════════════════════════════════════════════════
// ASSET — stessa struttura di cartelle già in uso
//   assets/mushrooms/{colore}.png / {colore}_scared.png
//   assets/spiders/spider1.png, spider2.png, spider3.png, caterpillar.png
//   assets/bombs/bomb_h.png, bomb_v.png, bomb_cross.png
//   assets/specials/witch.png, bomber.png, web.png, petrified.png
// ═══════════════════════════════════════════════════════
const SPIDER_FILES = { 1: 'spider1.png', 2: 'spider2.png', 3: 'spider3.png', 4: 'caterpillar.png' };
const BOMB_FILES   = { h: 'bomb_h.png', v: 'bomb_v.png', cross: 'bomb_cross.png' };

function buildAssetManifest() {
  const manifest = {};
  COLOR_NAMES.forEach(name => {
    manifest['mushroom_' + name]             = 'assets/mushrooms/' + name + '.png';
    manifest['mushroom_' + name + '_scared'] = 'assets/mushrooms/' + name + '_scared.png';
  });
  Object.keys(SPIDER_FILES).forEach(lvl => { manifest['spider_' + lvl] = 'assets/spiders/' + SPIDER_FILES[lvl]; });
  Object.keys(BOMB_FILES).forEach(bt => { manifest['bomb_' + bt] = 'assets/bombs/' + BOMB_FILES[bt]; });
  manifest.witch     = 'assets/specials/witch.png';
  manifest.bomber    = 'assets/specials/bomber.png';
  manifest.web       = 'assets/specials/web.png';
  manifest.petrified = 'assets/specials/petrified.png';
  return manifest;
}

function loadImageEl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Impossibile caricare: ' + url));
    img.src = url;
  });
}

// Rende trasparente lo sfondo pieno (bianco o altra tinta chiara) di una
// PNG, rilevando automaticamente il colore di sfondo dai 4 angoli
// dell'immagine. Elaborazione una tantum su canvas, poi si usa il
// risultato (data URL) come src di un normale <img>.
function keyOutBackground(img, tolerance) {
  tolerance = tolerance === undefined ? 40 : tolerance;
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);

  let imgData;
  try {
    imgData = ctx.getImageData(0, 0, w, h);
  } catch (e) {
    console.warn('Impossibile leggere i pixel (CORS?), sfondo non rimosso per', img.src);
    return img.src;
  }
  const data = imgData.data;
  const px = (x, y) => (y * w + x) * 4;
  const corners = [px(0, 0), px(w - 1, 0), px(0, h - 1), px(w - 1, h - 1)];
  let br = 0, bg = 0, bb = 0;
  corners.forEach(i => { br += data[i]; bg += data[i + 1]; bb += data[i + 2]; });
  br /= 4; bg /= 4; bb /= 4;

  for (let i = 0; i < data.length; i += 4) {
    const dr = data[i] - br, dg = data[i + 1] - bg, db = data[i + 2] - bb;
    const dist = Math.sqrt(dr * dr + dg * dg + db * db);
    if (dist < tolerance) data[i + 3] = Math.round(data[i + 3] * (dist / tolerance));
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas.toDataURL('image/png');
}

async function loadKeyedDataUrl(url) {
  const img = await loadImageEl(url);
  return keyOutBackground(img);
}

let TEX = null;
async function loadAssets() {
  const manifest = buildAssetManifest();
  const entries = Object.entries(manifest);
  const loaded = {};
  await Promise.all(entries.map(async ([key, url]) => { loaded[key] = await loadKeyedDataUrl(url); }));

  TEX = { mushroom: {}, mushroomScared: {}, spider: {}, bomb: {} };
  COLOR_NAMES.forEach(name => {
    TEX.mushroom[name]       = loaded['mushroom_' + name];
    TEX.mushroomScared[name] = loaded['mushroom_' + name + '_scared'];
  });
  Object.keys(SPIDER_FILES).forEach(lvl => { TEX.spider[lvl] = loaded['spider_' + lvl]; });
  Object.keys(BOMB_FILES).forEach(bt => { TEX.bomb[bt] = loaded['bomb_' + bt]; });
  TEX.witch = loaded.witch; TEX.bomber = loaded.bomber;
  TEX.web = loaded.web; TEX.petrified = loaded.petrified;
}

// ── ANIMAZIONI (Web Animations API) ──────────────────────
function popIn(el) {
  el.animate([{ transform: 'scale(0.15)' }, { transform: 'scale(1)' }],
    { duration: 240, easing: 'cubic-bezier(.34,1.56,.64,1)' });
}
function pulseOnce(el, peak, dur) {
  peak = peak || 1.28; dur = dur || ANIM_MS;
  el.animate([{ transform: 'scale(1)' }, { transform: 'scale(' + peak + ')' }, { transform: 'scale(1)' }],
    { duration: dur, easing: 'ease-out' });
}
function flashTint(el, colorHex, ms) {
  ms = ms || 380;
  const css = cssColor(colorHex);
  el.style.boxShadow = `0 0 0 3px ${css}aa, 0 0 14px 3px ${css}66`;
  setTimeout(() => { el.style.boxShadow = ''; }, ms);
}

// ── ELEMENTI DOM ──────────────────────────────────────────
const scoreEl = document.getElementById('score');
const boardEl = document.getElementById('board');
const feedbackEl = document.getElementById('feedback');
const spiderCountdownEl = document.getElementById('spiderCountdown');
const reserveEl = document.getElementById('reserveToken');
const queueContainerEl = document.getElementById('queue');
const powerBarsEl = document.getElementById('powerbars');
const gameOverEl = document.getElementById('gameOver');
const finalScoreEl = document.getElementById('finalScore');
const loadingEl = document.getElementById('loading');

const cellEls = [];
for (let r = 0; r < ROWS; r++) {
  cellEls[r] = [];
  for (let c = 0; c < COLS; c++) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.innerHTML = '<img class="mush"><img class="icon">';
    el.addEventListener('click', () => onCellClick(r, c));
    boardEl.appendChild(el);
    cellEls[r][c] = el;
  }
}

const queueEls = [0, 1, 2].map(i => {
  const el = document.createElement('div');
  el.className = 'token q' + i;
  el.innerHTML = '<img>';
  queueContainerEl.appendChild(el);
  return el;
});
reserveEl.addEventListener('click', () => onReserveClick());

const PB_ORDER = ['red', 'yellow', 'blue', 'green', 'orange', 'purple'];
const powerBarEls = {};
PB_ORDER.forEach(name => {
  const wrap = document.createElement('div');
  wrap.className = 'pb';
  const track = document.createElement('div');
  track.className = 'pb-track';
  const fill = document.createElement('div');
  fill.className = 'pb-fill';
  fill.style.background = cssColor(COLORS[name]);
  track.appendChild(fill);
  const label = document.createElement('div');
  label.className = 'pb-label';
  label.textContent = COLOR_LABELS[name];
  wrap.appendChild(track); wrap.appendChild(label);
  powerBarsEl.appendChild(wrap);
  powerBarEls[name] = { fill, label };
});
function setPowerBar(name, pct) {
  powerBarEls[name].fill.style.width = Math.max(0, Math.min(1, pct)) * 100 + '%';
  powerBarEls[name].label.classList.toggle('full', pct >= 1);
}

document.getElementById('newGameBtn').addEventListener('click', () => newGame());
document.getElementById('retryBtn').addEventListener('click', () => newGame());

// ── FEEDBACK ──────────────────────────────────────────────
let feedbackTimer = null;
function feedback(msg, colorHex, ms) {
  clearTimeout(feedbackTimer);
  feedbackEl.textContent = msg;
  feedbackEl.style.color = colorHex === undefined ? '#888' : cssColor(colorHex);
  if (ms) feedbackTimer = setTimeout(() => { feedbackEl.textContent = ''; }, ms);
}

// ── STATO DI GIOCO ────────────────────────────────────────
let grid, queue, reserve, score, tapCount, gameOver, busy, cascading;
let needSpiderMove, needSpawn, spiderSeq, powerCharge;

function mkEmptyCell() { return { color: null, bomb: null, spider: 0, spiderId: 0, web: false, black: false, empty: true }; }
function mkCell(color) { return { color: color || rndColor(), bomb: null, spider: 0, spiderId: 0, web: false, black: false, empty: false }; }
function rndColor() { return COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)]; }
function rndToken() {
  const r = Math.random();
  if (r < 1 / 7) return 'witch';
  if (r < 2 / 7) return 'bomber';
  return rndColor();
}

// ── RENDER CELLE / TOKEN ──────────────────────────────────
function renderCell(r, c) {
  const d = grid[r][c];
  const el = cellEls[r][c];
  el.className = 'cell';
  el.style.transform = '';
  const mush = el.querySelector('.mush');
  const icon = el.querySelector('.icon');
  mush.style.display = 'none';
  icon.style.display = 'none';
  icon.classList.remove('big');

  if (d.empty) { el.classList.add('empty'); return; }
  if (d.black && !d.spider) {
    el.classList.add('black');
    icon.src = TEX.petrified;
    icon.classList.add('big');
    icon.style.display = 'block';
    return;
  }

  const scared = !!(d.spider || d.web);
  mush.src = scared ? TEX.mushroomScared[d.color] : TEX.mushroom[d.color];
  mush.style.display = 'block';

  if (d.bomb) { icon.src = TEX.bomb[d.bomb]; icon.style.display = 'block'; }
  else if (d.spider) { icon.src = TEX.spider[d.spider]; icon.style.display = 'block'; }
  else if (d.web) { icon.src = TEX.web; icon.style.display = 'block'; }
}
function renderAllCells() { for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) renderCell(r, c); }

function renderToken(el, token) {
  el.classList.remove('witch', 'bomber');
  const img = el.querySelector('img');
  let span = el.querySelector('span');

  if (!token) {
    img.style.display = 'none';
    if (!span) { span = document.createElement('span'); span.textContent = 'vuota'; el.appendChild(span); }
    span.style.display = 'block';
    return;
  }
  if (span) span.style.display = 'none';
  img.style.display = 'block';

  if (token === 'witch') { el.classList.add('witch'); img.src = TEX.witch; return; }
  if (token === 'bomber') { el.classList.add('bomber'); img.src = TEX.bomber; return; }
  img.src = TEX.mushroom[token];
}
function renderQueueUI() { queueEls.forEach((el, i) => renderToken(el, queue[i])); }
function renderReserveUI() { renderToken(reserveEl, reserve); }
function renderCountdown() {
  const remaining = SPIDER_EVERY - (tapCount % SPIDER_EVERY);
  spiderCountdownEl.textContent = String(remaining);
  if (remaining === 1) pulseOnce(spiderCountdownEl, 1.4, 300);
}

// ── MATCH DETECTION ───────────────────────────────────────
function canMatch(r, c) {
  const d = grid[r][c];
  return !d.black && !d.bomb && !d.empty;
}
function findMatches() {
  const runs = [];
  for (let r = 0; r < ROWS; r++) {
    let s = 0;
    for (let c = 1; c <= COLS; c++) {
      const cont = c < COLS && canMatch(r, c) && canMatch(r, c - 1) && grid[r][c].color === grid[r][c - 1].color;
      if (!cont) {
        if (c - s >= 3 && canMatch(r, s)) runs.push({ cells: Array.from({ length: c - s }, (_, i) => ({ r, c: s + i })), dir: 'h' });
        s = c;
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    let s = 0;
    for (let r = 1; r <= ROWS; r++) {
      const cont = r < ROWS && canMatch(r, c) && canMatch(r - 1, c) && grid[r][c].color === grid[r - 1][c].color;
      if (!cont) {
        if (r - s >= 3 && canMatch(s, c)) runs.push({ cells: Array.from({ length: r - s }, (_, i) => ({ r: s + i, c })), dir: 'v' });
        s = r;
      }
    }
  }
  if (!runs.length) return [];

  const cellToRun = {};
  runs.forEach((run, idx) => run.cells.forEach(({ r, c }) => {
    const k = r + ',' + c;
    (cellToRun[k] = cellToRun[k] || []).push(idx);
  }));

  const used = new Set(), merged = [];
  runs.forEach((run, idx) => {
    if (used.has(idx)) return;
    const group = new Set([idx]);
    run.cells.forEach(({ r, c }) => (cellToRun[r + ',' + c] || []).forEach(j => group.add(j)));
    group.forEach(j => used.add(j));

    const allCells = new Map();
    const dirs = new Set();
    group.forEach(j => {
      runs[j].cells.forEach(cell => allCells.set(cell.r + ',' + cell.c, cell));
      dirs.add(runs[j].dir);
    });

    const cells = [...allCells.values()];
    const type = dirs.size > 1 ? 'cross' : (cells.length > 3 ? runs[[...group][0]].dir : 'none');
    merged.push({ cells, type });
  });
  return merged;
}
function bombType(match) {
  if (match.type === 'cross') return 'cross';
  if (match.type === 'h' && match.cells.length >= 4) return 'h';
  if (match.type === 'v' && match.cells.length >= 4) return 'v';
  return null;
}

// ── SPAWN / CASCATA ───────────────────────────────────────
function spawnCells(keys, bombPlacements) {
  const played = new Set();
  keys.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    if (grid[r][c].empty) return;
    grid[r][c] = mkCell();
    const color = grid[r][c].color;
    renderCell(r, c);
    popIn(cellEls[r][c]);
    if (!played.has(color)) { playMatchSound(color); played.add(color); }
  });
  bombPlacements.forEach(({ r, c, type, color }) => {
    grid[r][c] = mkCell(color);
    grid[r][c].bomb = type;
    renderCell(r, c);
    popIn(cellEls[r][c]);
  });
}

function resolveBoard() {
  const matches = findMatches();
  if (!matches.length) { tryMoveSpiders(); return; }

  cascading++;
  const toSpawn = new Set();
  const bombs = [];

  matches.forEach(match => {
    const bt = bombType(match);
    match.cells.forEach(({ r, c }) => {
      toSpawn.add(r + ',' + c);
      pulseOnce(cellEls[r][c], 1.25, ANIM_MS);
    });
    if (bt) {
      const mid = match.cells[Math.floor(match.cells.length / 2)];
      bombs.push({ r: mid.r, c: mid.c, type: bt, color: grid[mid.r][mid.c].color });
    }
  });

  setTimeout(() => {
    spawnCells(toSpawn, bombs);
    cascading--;
    setTimeout(resolveBoard, CASCADE_MS);
  }, ANIM_MS);
}

function applyMatches(matches, tapR, tapC) {
  if (!matches.length) return false;

  const toSpawn = new Set();
  const bombs = [];

  matches.forEach(match => {
    const bt = bombType(match);
    match.cells.forEach(({ r, c }) => {
      toSpawn.add(r + ',' + c);
      pulseOnce(cellEls[r][c], 1.25, ANIM_MS);
    });
    if (bt) {
      const inMatch = tapR !== undefined && match.cells.some(d => d.r === tapR && d.c === tapC);
      const pos = inMatch ? { r: tapR, c: tapC } : match.cells[Math.floor(match.cells.length / 2)];
      bombs.push({ r: pos.r, c: pos.c, type: bt, color: grid[pos.r][pos.c].color });
    }
  });

  score += toSpawn.size * 10;
  scoreEl.textContent = 'Punteggio: ' + score;

  const firstCell = matches[0].cells[0];
  playMatchSound(grid[firstCell.r][firstCell.c].color);

  if (bombs.length) {
    feedback(bombs.map(b => b.type === 'cross' ? '✛ Croce!' : b.type === 'h' ? '↔ Riga!' : '↕ Col.!').join(' '), 0xffd700, 1500);
  } else {
    feedback('+' + toSpawn.size * 10, 0xaaaaaa, 1200);
  }

  cascading++;
  setTimeout(() => {
    spawnCells(toSpawn, bombs);
    cascading--;
    setTimeout(resolveBoard, CASCADE_MS);
  }, ANIM_MS);

  const hasGood = matches.some(m => m.type !== 'none');

  matches.forEach(match => {
    const colorCount = {};
    match.cells.forEach(({ r, c }) => {
      const col = grid[r] && grid[r][c] ? grid[r][c].color : null;
      if (col) colorCount[col] = (colorCount[col] || 0) + 1;
    });
    Object.entries(colorCount).forEach(([col, amt]) => addPowerCharge(col, amt));
  });

  return hasGood ? 'good' : 'small';
}

// ── BOMBE ─────────────────────────────────────────────────
function explodeBomb(r, c, exploded) {
  if (!exploded) exploded = new Set();
  const key = r + ',' + c;
  if (exploded.has(key)) return;
  exploded.add(key);

  const bt = grid[r][c].bomb;
  if (!bt) return;

  const hit = new Set();
  if (bt === 'h' || bt === 'cross') for (let cc = 0; cc < COLS; cc++) { if (!grid[r][cc].empty) hit.add(r + ',' + cc); }
  if (bt === 'v' || bt === 'cross') for (let rr = 0; rr < ROWS; rr++) { if (!grid[rr][c].empty) hit.add(rr + ',' + c); }

  const chain = [];
  hit.forEach(k => {
    const [rr, cc] = k.split(',').map(Number);
    if ((rr !== r || cc !== c) && grid[rr][cc].bomb && !exploded.has(k)) chain.push({ r: rr, c: cc });
  });

  hit.forEach(k => {
    const [rr, cc] = k.split(',').map(Number);
    const d = grid[rr][cc];
    if (d.spider) { d.spider = 0; d.spiderId = 0; }
    d.web = false; d.black = false;
  });

  hit.forEach(k => {
    const [rr, cc] = k.split(',').map(Number);
    pulseOnce(cellEls[rr][cc], 1.4, ANIM_MS);
  });

  score += hit.size * 10;
  scoreEl.textContent = 'Punteggio: ' + score;
  playBombSound(bt);

  const label = bt === 'cross' ? '✛ Croce' : bt === 'h' ? '↔ Riga' : '↕ Col.';
  feedback(label + (chain.length ? ' 💥 Catena!' : '! +' + hit.size * 10), 0xffd700, 1500);

  chain.forEach(({ r: rr, c: cc }) => explodeBomb(rr, cc, exploded));

  cascading++;
  setTimeout(() => {
    hit.forEach(k => {
      const [rr, cc] = k.split(',').map(Number);
      const col = grid[rr][cc] ? grid[rr][cc].color : null;
      if (col) addPowerCharge(col, 1);
    });
    spawnCells(hit, []);
    cascading--;
    setTimeout(resolveBoard, CASCADE_MS);
  }, ANIM_MS);
}

// ── RAGNI ─────────────────────────────────────────────────
function currentSpiderLevel() {
  for (const { min, level } of SPIDER_THRESHOLDS) if (score >= min) return level;
  return 1;
}
function freeCells() {
  const free = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const d = grid[r][c];
    if (!d.spider && !d.web && !d.black && !d.bomb && !d.empty) free.push({ r, c });
  }
  return free;
}
function spawnSpider() {
  const lvl = currentSpiderLevel();
  const free = freeCells();
  if (!free.length) { triggerGameOver(); return; }

  const pos = free[Math.floor(Math.random() * free.length)];
  spiderSeq++;
  grid[pos.r][pos.c].spider = lvl;
  grid[pos.r][pos.c].spiderId = spiderSeq;
  renderCell(pos.r, pos.c);
  popIn(cellEls[pos.r][pos.c]);

  const msg = lvl === 3 ? '💀 Ragno nero!' : lvl === 2 ? '🕷 Ragno velenoso!' : '🕷 Ragno!';
  feedback(msg, 0xe74c3c, 1800);

  checkStalemate();
  if (freeCells().length === 0) triggerGameOver();
}

function scheduleMoveSpiders() { needSpiderMove = true; tryMoveSpiders(); }
function tryMoveSpiders() {
  if (cascading > 0 || !needSpiderMove) return;
  needSpiderMove = false;
  moveSpiders();
  if (needSpawn) { needSpawn = false; spawnSpider(); }
  busy = false;
}

function moveSpiders() {
  const spiders = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (grid[r][c].spider) spiders.push({ r, c, lvl: grid[r][c].spider, sid: grid[r][c].spiderId });
  if (!spiders.length) return;

  spiders.forEach(({ r, c, lvl }) => {
    grid[r][c].spider = 0; grid[r][c].spiderId = 0;
    if (lvl === 2) grid[r][c].web = true;
    if (lvl === 3) grid[r][c].black = true;
    if (lvl === 4) grid[r][c] = mkEmptyCell();
  });

  const taken = new Set();
  spiders.forEach(({ r, c, lvl, sid }) => {
    if (lvl === 4) return;
    const free = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      const k = rr + ',' + cc;
      const d = grid[rr][cc];
      if (!d.web && !d.black && !d.bomb && !d.spider && !d.empty && !taken.has(k)) free.push({ r: rr, c: cc });
    }
    if (!free.length) return;
    const dest = free[Math.floor(Math.random() * free.length)];
    taken.add(dest.r + ',' + dest.c);
    grid[dest.r][dest.c].spider = lvl;
    grid[dest.r][dest.c].spiderId = sid;
  });

  renderAllCells();
  if (freeCells().length === 0) triggerGameOver();
}

function checkStalemate() {
  const nextColor = queue[0];
  const reserveColor = reserve;
  if (nextColor === 'witch' || nextColor === 'bomber') return;

  const available = new Set([nextColor]);
  if (reserveColor && reserveColor !== 'witch' && reserveColor !== 'bomber') available.add(reserveColor);

  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const d = grid[r][c];
    if (!d.spider && !d.web && !d.black && !d.bomb && !d.empty) {
      if (!available.has(d.color)) return;
    }
  }
  triggerGameOver();
}

function triggerGameOver() {
  gameOver = true;
  finalScoreEl.textContent = 'Punteggio finale: ' + score;
  gameOverEl.classList.add('show');
}

// ── POWER-UP ──────────────────────────────────────────────
function addPowerCharge(color, amount) {
  if (!(color in powerCharge)) return;
  if (powerCharge[color] >= POWER_MAX) return;
  powerCharge[color] = Math.min(POWER_MAX, powerCharge[color] + amount);
  setPowerBar(color, powerCharge[color] / POWER_MAX);
  if (powerCharge[color] >= POWER_MAX) setTimeout(() => activatePower(color), 300);
}
function activatePower(color) {
  powerCharge[color] = 0;
  setPowerBar(color, 0);
  feedback('⚡ ' + COLOR_LABELS[color].toUpperCase() + ' POWER!', COLORS[color], 2000);
  switch (color) {
    case 'red':    powerRed();    break;
    case 'yellow': powerYellow(); break;
    case 'blue':   powerBlue();   break;
    case 'green':  powerGreen();  break;
    case 'orange': powerOrange(); break;
    case 'purple': powerPurple(); break;
  }
}

function flashCellsAndClear(cellSet, colorHex, mutateAfter) {
  cellSet.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    flashTint(cellEls[r][c], colorHex, 380);
    pulseOnce(cellEls[r][c], 1.15, 380);
  });
  setTimeout(() => {
    if (mutateAfter) mutateAfter();
    clearCellsSimple(cellSet);
  }, 400);
}
function clearCellsSimple(cellSet) {
  cascading++;
  setTimeout(() => {
    cellSet.forEach(k => {
      const [r, c] = k.split(',').map(Number);
      grid[r][c].spider = 0; grid[r][c].spiderId = 0;
      grid[r][c].web = false; grid[r][c].black = false;
      if (!grid[r][c].empty) { grid[r][c] = mkCell(); renderCell(r, c); popIn(cellEls[r][c]); }
      else renderCell(r, c);
    });
    cascading--;
    setTimeout(resolveBoard, CASCADE_MS);
  }, ANIM_MS);
}

function powerRed() {
  const free = [];
  for (let r = 1; r < ROWS - 1; r++) for (let c = 1; c < COLS - 1; c++) free.push({ r, c });
  for (let i = 0; i < 2; i++) {
    if (!free.length) break;
    const idx = Math.floor(Math.random() * free.length);
    const { r, c } = free.splice(idx, 1)[0];
    const cells = new Set();
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const r2 = r + dr, c2 = c + dc;
      if (r2 >= 0 && r2 < ROWS && c2 >= 0 && c2 < COLS && !grid[r2][c2].empty) cells.add(r2 + ',' + c2);
    }
    flashCellsAndClear(cells, 0xe74c3c, () => {
      cells.forEach(k => {
        const [r2, c2] = k.split(',').map(Number);
        const col = grid[r2][c2].color;
        if (col) addPowerCharge(col, 1);
      });
    });
  }
}
function powerYellow() {
  const set = Math.random() < 0.5 ? [0, 2, 4] : [1, 3, 5];
  const cells = new Set();
  set.forEach(r => { for (let c = 0; c < COLS; c++) { if (!grid[r][c].empty) cells.add(r + ',' + c); } });
  flashCellsAndClear(cells, 0xf1c40f);
}
function powerBlue() {
  const cells = new Set();
  for (let c = 0; c < COLS; c++) { cells.add('0,' + c); cells.add((ROWS - 1) + ',' + c); }
  for (let r = 1; r < ROWS - 1; r++) { cells.add(r + ',0'); cells.add(r + ',' + (COLS - 1)); }
  const cr = Math.floor(ROWS / 2), cc = Math.floor(COLS / 2);
  [[cr - 1, cc - 1], [cr - 1, cc], [cr, cc - 1], [cr, cc]].forEach(([r, c]) => cells.add(r + ',' + c));
  flashCellsAndClear(cells, 0x3498db);
}
function powerOrange() {
  const set = Math.random() < 0.5 ? [0, 2, 4] : [1, 3, 5];
  const cells = new Set();
  set.forEach(c => { for (let r = 0; r < ROWS; r++) { if (!grid[r][c].empty) cells.add(r + ',' + c); } });
  flashCellsAndClear(cells, 0xe67e22);
}
function powerGreen() {
  const free = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (!grid[r][c].bomb && !grid[r][c].spider && !grid[r][c].web && !grid[r][c].black && !grid[r][c].empty) free.push({ r, c });
  const chosen = new Set();
  for (let i = 0; i < 3; i++) {
    if (!free.length) break;
    const idx = Math.floor(Math.random() * free.length);
    const { r, c } = free.splice(idx, 1)[0];
    chosen.add(r + ',' + c);
  }
  chosen.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    flashTint(cellEls[r][c], 0x2ecc71, 380);
    pulseOnce(cellEls[r][c], 1.15, 380);
  });
  setTimeout(() => {
    chosen.forEach(k => {
      const [r, c] = k.split(',').map(Number);
      grid[r][c].bomb = 'cross';
      renderCell(r, c);
      popIn(cellEls[r][c]);
    });
  }, 400);
}
function powerPurple() {
  const cells = new Set();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (grid[r][c].spider || grid[r][c].web) cells.add(r + ',' + c);
  if (!cells.size) return;
  cells.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    flashTint(cellEls[r][c], 0x9b59b6, 380);
    pulseOnce(cellEls[r][c], 1.15, 380);
  });
  setTimeout(() => {
    cells.forEach(k => {
      const [r, c] = k.split(',').map(Number);
      grid[r][c].spider = 0; grid[r][c].spiderId = 0; grid[r][c].web = false;
      renderCell(r, c);
      pulseOnce(cellEls[r][c], 1.2, ANIM_MS);
    });
  }, 400);
}

// ── INPUT ─────────────────────────────────────────────────
function onCellClick(r, c) {
  if (gameOver || busy) return;
  const d = grid[r][c];
  if (d.spider || d.web || d.black || d.empty) return;

  busy = true;

  if (d.bomb) {
    tapCount++;
    if (tapCount % SPIDER_EVERY === 0) needSpawn = true;
    renderCountdown();
    explodeBomb(r, c);
    scheduleMoveSpiders();
    return;
  }

  const token = queue[0];
  if (token !== 'witch' && token !== 'bomber' && d.color === token) { busy = false; return; }

  if (token === 'witch' || token === 'bomber') {
    tapCount++;
    if (tapCount % SPIDER_EVERY === 0) needSpawn = true;
    renderCountdown();
  }

  if (token === 'witch') {
    const targetColor = d.color;
    queue.shift(); queue.push(rndToken());
    renderQueueUI();

    const el = cellEls[r][c];
    el.className = 'cell';
    el.style.background = '#2c2c54';
    const mush = el.querySelector('.mush'), icon = el.querySelector('.icon');
    icon.style.display = 'none';
    mush.src = TEX.witch;
    mush.style.display = 'block';

    const toMatch = new Set();
    for (let r2 = 0; r2 < ROWS; r2++) for (let c2 = 0; c2 < COLS; c2++)
      if (grid[r2][c2].color === targetColor && !grid[r2][c2].black && !grid[r2][c2].bomb && !grid[r2][c2].empty) toMatch.add(r2 + ',' + c2);

    toMatch.forEach(k => {
      const [r2, c2] = k.split(',').map(Number);
      flashTint(cellEls[r2][c2], 0xffffff, 900);
      pulseOnce(cellEls[r2][c2], 1.2, 900);
    });

    score += toMatch.size * 10;
    scoreEl.textContent = 'Punteggio: ' + score;
    feedback('✨ Magia! +' + toMatch.size * 10, 0xffd700, 2000);

    cascading++;
    setTimeout(() => {
      toMatch.forEach(k => {
        const [r2, c2] = k.split(',').map(Number);
        addPowerCharge(targetColor, 1);
        grid[r2][c2].spider = 0; grid[r2][c2].spiderId = 0; grid[r2][c2].web = false;
        grid[r2][c2] = mkCell();
        renderCell(r2, c2); popIn(cellEls[r2][c2]);
      });
      el.style.background = '';
      renderCell(r, c);
      cascading--;
      scheduleMoveSpiders();
      setTimeout(resolveBoard, CASCADE_MS);
    }, 950);

    renderCountdown();
    return;
  }

  if (token === 'bomber') {
    queue.shift(); queue.push(rndToken());
    renderQueueUI();

    const el = cellEls[r][c];
    el.className = 'cell';
    el.style.background = '#5c2c2c';
    const mush = el.querySelector('.mush'), icon = el.querySelector('.icon');
    icon.style.display = 'none';
    mush.src = TEX.bomber;
    mush.style.display = 'block';

    const toExplode = new Set();
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const r2 = r + dr, c2 = c + dc;
      if (r2 >= 0 && r2 < ROWS && c2 >= 0 && c2 < COLS && !grid[r2][c2].empty) toExplode.add(r2 + ',' + c2);
    }

    toExplode.forEach(k => {
      const [r2, c2] = k.split(',').map(Number);
      flashTint(cellEls[r2][c2], 0xff6b00, 900);
      pulseOnce(cellEls[r2][c2], 1.2, 900);
    });

    feedback('💥 Boom! +' + toExplode.size * 10, 0xff6b00, 1500);

    setTimeout(() => {
      const chainBombs = [];
      toExplode.forEach(k => {
        const [r2, c2] = k.split(',').map(Number);
        if (grid[r2][c2].bomb) chainBombs.push({ r: r2, c: c2, bomb: grid[r2][c2].bomb });
      });

      score += toExplode.size * 10;
      scoreEl.textContent = 'Punteggio: ' + score;
      if (chainBombs.length) feedback('💥 Catena!', 0xff6b00, 1500);

      cascading++;
      setTimeout(() => {
        toExplode.forEach(k => {
          const [r2, c2] = k.split(',').map(Number);
          const elimColor = grid[r2][c2].color;
          if (elimColor) addPowerCharge(elimColor, 1);
          grid[r2][c2].spider = 0; grid[r2][c2].spiderId = 0; grid[r2][c2].web = false; grid[r2][c2].black = false;
          grid[r2][c2] = mkCell();
          renderCell(r2, c2); popIn(cellEls[r2][c2]);
        });
        el.style.background = '';
        chainBombs.forEach(({ r: r2, c: c2, bomb }) => {
          grid[r2][c2].bomb = bomb;
          explodeBomb(r2, c2);
        });
        cascading--;
        scheduleMoveSpiders();
        setTimeout(resolveBoard, CASCADE_MS);
      }, ANIM_MS);
    }, 950);

    renderCountdown();
    return;
  }

  // Piazza colore
  grid[r][c] = mkCell(token);
  queue.shift(); queue.push(rndToken());
  renderCell(r, c);
  popIn(cellEls[r][c]);
  renderQueueUI();

  tapCount++;
  if (tapCount % SPIDER_EVERY === 0) needSpawn = true;
  renderCountdown();

  const matches = findMatches();
  const result = applyMatches(matches, r, c);

  checkStalemate();

  if (result === false) {
    moveSpiders();
    if (needSpawn) { needSpawn = false; spawnSpider(); }
    busy = false;
  } else {
    scheduleMoveSpiders();
  }
}

function onReserveClick() {
  if (gameOver || busy) return;
  const cur = queue[0];
  if (!reserve) {
    reserve = cur;
    queue.shift();
    queue.push(rndToken());
  } else {
    const tmp = reserve;
    reserve = queue[0];
    queue[0] = tmp;
  }
  renderReserveUI();
  renderQueueUI();
}

// ── AUDIO (Web Audio, invariato) ──────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(opts) {
  opts = opts || {};
  const freq = opts.freq !== undefined ? opts.freq : 440;
  const freq2 = opts.freq2 !== undefined ? opts.freq2 : null;
  const type = opts.type || 'sine';
  const attack = opts.attack !== undefined ? opts.attack : 0.01;
  const decay = opts.decay !== undefined ? opts.decay : 0.15;
  const vol = opts.vol !== undefined ? opts.vol : 0.3;
  const vibrato = opts.vibrato || 0;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (freq2) osc.frequency.linearRampToValueAtTime(freq2, ctx.currentTime + decay);
    if (vibrato > 0) {
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.setValueAtTime(vibrato, ctx.currentTime);
      lfoGain.gain.setValueAtTime(15, ctx.currentTime);
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(); lfo.stop(ctx.currentTime + decay + 0.1);
    }
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + attack + decay);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + attack + decay + 0.05);
  } catch (e) {}
}
function playMatchSound(color) {
  switch (color) {
    case 'red':
      playTone({ freq: 523, freq2: 784, type: 'square', decay: 0.12, vol: 0.25 });
      setTimeout(() => playTone({ freq: 784, freq2: 1047, type: 'square', decay: 0.1, vol: 0.2 }), 80);
      break;
    case 'yellow':
      playTone({ freq: 1047, type: 'sine', attack: 0.05, decay: 0.2, vol: 0.15, vibrato: 6 });
      break;
    case 'blue':
      playTone({ freq: 130, freq2: 98, type: 'sawtooth', decay: 0.2, vol: 0.3 });
      setTimeout(() => playTone({ freq: 110, type: 'square', decay: 0.1, vol: 0.15 }), 60);
      break;
    case 'green':
      playTone({ freq: 330, freq2: 880, type: 'sine', attack: 0.005, decay: 0.18, vol: 0.25 });
      break;
    case 'orange':
      playTone({ freq: 880, type: 'triangle', decay: 0.08, vol: 0.2 });
      setTimeout(() => playTone({ freq: 698, type: 'triangle', decay: 0.08, vol: 0.2 }), 70);
      setTimeout(() => playTone({ freq: 587, type: 'triangle', decay: 0.1, vol: 0.2 }), 140);
      break;
    case 'purple':
      playTone({ freq: 659, type: 'sine', attack: 0.08, decay: 0.5, vol: 0.2, vibrato: 5 });
      setTimeout(() => playTone({ freq: 523, type: 'sine', attack: 0.05, decay: 0.4, vol: 0.12, vibrato: 4 }), 150);
      break;
  }
}
function playBombSound() {
  playTone({ freq: 200, freq2: 50, type: 'sawtooth', decay: 0.3, vol: 0.4 });
  setTimeout(() => playTone({ freq: 150, freq2: 40, type: 'square', decay: 0.25, vol: 0.3 }), 60);
}

// ── NUOVA PARTITA ─────────────────────────────────────────
function newGame() {
  gameOver = false; busy = false; cascading = 0;
  needSpiderMove = false; needSpawn = false; spiderSeq = 0;
  score = 0; tapCount = 0; reserve = null;

  scoreEl.textContent = 'Punteggio: 0';
  feedback('');
  gameOverEl.classList.remove('show');

  grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => mkCell()));
  queue = [rndToken(), rndToken(), rndToken()];

  powerCharge = { red: 0, yellow: 0, blue: 0, green: 0, orange: 0, purple: 0 };
  PB_ORDER.forEach(name => setPowerBar(name, 0));

  renderAllCells();
  renderQueueUI();
  renderReserveUI();
  renderCountdown();

  setTimeout(resolveBoard, 150);
}

// ── AVVIO ─────────────────────────────────────────────────
loadAssets()
  .then(() => { loadingEl.classList.add('hide'); newGame(); })
  .catch(err => {
    console.error('Errore nel caricamento degli asset:', err);
    loadingEl.textContent =
      'Impossibile caricare gli asset.\n' +
      'Verifica che esistano, relative a questo file:\n' +
      'assets/mushrooms/{colore}.png e {colore}_scared.png\n' +
      'assets/spiders/spider1.png, spider2.png, spider3.png, caterpillar.png\n' +
      'assets/bombs/bomb_h.png, bomb_v.png, bomb_cross.png\n' +
      'assets/specials/witch.png, bomber.png, web.png, petrified.png';
  });
