<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shroomatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- UI HTML sopra al canvas Pixi -->
  <div id="ui">

    <div id="top-bar">
      <div id="score-wrap">
        <span class="label">Punteggio</span>
        <span id="score">0</span>
      </div>
      <div id="spider-wrap">
        <span class="label">Ragno tra</span>
        <span id="spider-countdown">2</span>
      </div>
    </div>

    <!-- Power bars 3x2 -->
    <div id="power-bars"></div>

    <!-- Canvas Pixi verrà inserito qui -->
    <div id="canvas-wrap"></div>

    <!-- Controlli: riserva + coda + (vuoto) -->
    <div id="controls">
      <div id="reserve-wrap">
        <div class="ctrl-label">Riserva</div>
        <div id="reserve-slot"></div>
      </div>
      <div id="queue-wrap">
        <div class="ctrl-label">Prossimi</div>
        <div id="queue-slots">
          <div class="q-slot" id="q0"></div>
          <div class="q-slot" id="q1"></div>
          <div class="q-slot" id="q2"></div>
        </div>
      </div>
      <div id="btn-wrap">
        <button id="btn-new">↺</button>
      </div>
    </div>

    <div id="feedback"></div>

  </div>

  <!-- Game Over overlay -->
  <div id="gameover">
    <h2>GAME OVER</h2>
    <p id="go-score"></p>
    <button id="go-btn">Rigioca</button>
  </div>

  <!-- Pixi.js v7 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
